<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Loading...</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal {
            width: 80%;
            max-width: 600px;
        }

        .log-line {
            margin: 5px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #fff;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        a { color: #888; text-decoration: none; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="terminal" id="terminal">
        <div class="log-line">Initializing system kernel... [OK]</div>
        <div class="log-line" style="animation-delay: 0.5s;">Accessing database: log.2019.3.27...</div>
        <div class="log-line" style="animation-delay: 1s;">Bypassing security protocols...</div>
        <div class="log-line" style="animation-delay: 1.5s;">Redirecting to target node... <span class="cursor"></span></div>
    </div>

    <a href="log.2019.3.27.html">Manual Entry</a>

    <script>
        // 設定 2.5 秒後跳轉，這段時間足以讓動畫跑完且避開瀏覽器即時攔截
        setTimeout(function() {
            window.location.replace("log.2019.3.27.html");
        }, 2500);
    </script>
</body>
</html>
