<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEV_FRAGMENT_RECOVERY_PROT</title>
</head>
<body style="background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; padding: 20px; margin: 0;">

    <pre id="log-container" style="height: 85vh; overflow-y: auto; margin: 0; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; line-height: 1.2;"></pre>

    <div style="border-top: 1px solid #0f0; padding: 10px 0; display: flex; align-items: center; background: #000;">
        <span style="white-space: nowrap;">HEV-GATE:\> </span>
        <input type="text" id="cmd-input" autofocus 
               style="background: transparent; border: none; color: #0f0; outline: none; font-family: inherit; font-size: 14px; width: 100%; margin-left: 5px;">
    </div>

    <script>
        const logContainer = document.getElementById('log-container');
        const input = document.getElementById('cmd-input');

        // F12 隱藏線索 (Base64: 0388)
        const token = "SEVWLUNPREUtaW5wdXQtMDEtMDM4OA==";
        console.log("%c [NODE_INFO] ", "background: #0f0; color: #000; font-weight: bold;");
        console.log("Encrypted Sequence Detected: " + token);
        console.log("Method: atob()");

        const bootLogs = [
            "Initializing HEV_GATE Protocol...",
            "Loading Chaos_Entropy_Module.js...",
            "Searching for fragmented records...",
            "[WARN] Archive 'ChatHistory.2019.3.29.txt' is ENCRYPTED.",
            "Waiting for 8-bit Logic Override Code..."
        ];

        function addLog(text, isHTML = false) {
            const line = document.createElement('div');
            line.style.marginBottom = "2px";
            if (isHTML) {
                line.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
            } else {
                line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            }
            logContainer.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 初始啟動日誌
        bootLogs.forEach((msg, i) => {
            setTimeout(() => addLog(msg), i * 600);
        });

        // 定期產生隨機背景 Log
        setInterval(() => {
            const noise = [
                "Ping: 127.0.0.1 ... OK",
                "Data Stream: " + Math.random().toString(16).substring(2, 10),
                "Status: STANDBY",
                "Memory usage: " + (Math.random() * 100).toFixed(2) + "MB"
            ];
            addLog(noise[Math.floor(Math.random() * noise.length)]);
        }, 4000);

        // 指令邏輯
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim().toUpperCase();
                addLog(`HEV-GATE:\\> ${this.value}`);
                
                if (val === '0388') {
                    addLog("--------------------------------------------------", false);
                    addLog("STATUS: [ACCESS_GRANTED]", false);
                    addLog("EXCLUSIVE_CODE: <span style='color: yellow; font-weight: bold;'>DIS-X77-HEV-LOG</span>", true);
                    addLog("DECRYPTING: ChatHistory.2019.3.29.txt", false);
                    
                    // 生成手動下載連結，避開 Chrome 阻斷
                    setTimeout(() => {
                        addLog("<a href='ChatHistory.2019.3.29.txt' download style='color: #fff; background: #005500; padding: 2px 5px; text-decoration: none; border: 1px solid #0f0;'>[ CLICK TO DOWNLOAD ARCHIVE ]</a>", true);
                    }, 1000);
                    addLog("--------------------------------------------------", false);
                } else if (val === 'HELP') {
                    addLog("COMMANDS: HELP, STATUS, CLEAR, EXIT");
                } else if (val === 'CLEAR') {
                    logContainer.innerHTML = '';
                } else {
                    addLog("ERROR: INVALID_KEY_SEQUENCE. ACCESS DENIED.");
                }
                
                this.value = '';
            }
        });

        // 點擊頁面任何地方都自動聚焦輸入框
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
